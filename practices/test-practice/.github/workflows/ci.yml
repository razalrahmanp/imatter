name: CI / CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: "20"

# ── PULL REQUEST — must pass before merge ─────────────────────────────────────
jobs:
  # Fast, dependency-free — runs on any PR that touches skills/
  validate-skills:
    name: Validate skill registry
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate skill frontmatter
        run: node scripts/validate-skills.js

      - name: Check registry index is up to date
        run: node scripts/generate-registry.js --check

  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: teashop_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies (frozen lockfile)
        run: npm ci

      - name: Type check
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high

      - name: Run migrations (test DB)
        run: npm run migrate:test
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5433/teashop_test

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5433/teashop_test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

# ── STAGING DEPLOY — runs on merge to main ────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: teashop_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Vulnerability scan
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm run test:coverage
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5433/teashop_test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run DB migrations (staging)
        run: npm run migrate:staging
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Deploy Lambda functions (staging)
        run: npm run deploy:staging

      - name: Smoke test staging
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.STAGING_API_URL }}/health)
          if [ "$RESPONSE" != "200" ]; then
            echo "Smoke test failed — staging /health returned $RESPONSE"
            exit 1
          fi
          echo "Smoke test passed — staging is alive"

# ── PRODUCTION DEPLOY — manual approval required ──────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production  # GitHub environment with required reviewers — blocks until approved

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (prod)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run DB migrations (prod)
        run: npm run migrate:prod
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Deploy Lambda functions (prod)
        run: npm run deploy:prod

      - name: Smoke test prod
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PROD_API_URL }}/health)
          if [ "$RESPONSE" != "200" ]; then
            echo "Smoke test failed — prod /health returned $RESPONSE"
            exit 1
          fi
          echo "Smoke test passed — prod is alive"
